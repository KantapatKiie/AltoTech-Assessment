services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: altotech
      POSTGRES_USER: altotech
      POSTGRES_PASSWORD: altotech
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altotech -d altotech"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    command: sh /app/entrypoint.sh
    env_file:
      - .env.local
    environment:
      DEBUG: "1"
      DJANGO_SECRET_KEY: local-dev-secret
      POSTGRES_DB: altotech
      POSTGRES_USER: altotech
      POSTGRES_PASSWORD: altotech
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  timescale_data:
